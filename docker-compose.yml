services:
  trainer-cpu:
    build:
      context: .
      dockerfile: Dockerfile
    image: parallel-programming-exam-cpu
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./:/app
      - ./outputs:/app/outputs
    working_dir: /app
    command: bash

  # GPU services are versioned by hardware target so new variants can be added later.
  trainer-gpu129:
    build:
      context: .
      dockerfile: Dockerfile.gpu129
    image: parallel-programming-exam-gpu129
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - PYTHONUNBUFFERED=1
    volumes:
      - ./:/app
      - ./outputs:/app/outputs
    working_dir: /app
    command: bash

  trainer-gpu130:
    build:
      context: .
      dockerfile: Dockerfile.gpu130
    image: parallel-programming-exam-gpu130
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - PYTHONUNBUFFERED=1
    volumes:
      - ./:/app
      - ./outputs:/app/outputs
    working_dir: /app
    command: bash

  train-qkernel:
    image: parallel-programming-exam-gpu130
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - PYTHONUNBUFFERED=1
    volumes:
      - ./:/app
      - ./outputs:/app/outputs
    working_dir: /app
    command: python3 train_svm_qkernel.py

  train-classical:
    image: parallel-programming-exam-cpu
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./:/app
      - ./outputs:/app/outputs
    working_dir: /app
    command: python3 train_svm_classical.py

  benchmark:
    image: parallel-programming-exam-gpu130
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - PYTHONUNBUFFERED=1
    volumes:
      - ./:/app
      - ./outputs:/app/outputs
    working_dir: /app
    command: python3 benchmark.py

  extract-results:
    image: parallel-programming-exam-cpu
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./:/app
      - ./outputs:/app/outputs
    working_dir: /app
    command: python3 extract_results.py

  run-all-gpu130:
    image: parallel-programming-exam-gpu130
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - PYTHONUNBUFFERED=1
    volumes:
      - ./:/app
      - ./outputs:/app/outputs
    working_dir: /app
    command: bash run_all_gpu.sh

  run-all-cpu:
    image: parallel-programming-exam-cpu
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./:/app
      - ./outputs:/app/outputs
    working_dir: /app
    command: bash run_all_cpu.sh
